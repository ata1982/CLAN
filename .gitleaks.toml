# 🔒 Gitleaks設定ファイル
# 機密情報検出パターンの設定

title = "Gitleaks config"

# 除外するファイルパターン
[allowlist]
description = "global allowlist"
paths = [
    '''\.env\.example$''',
    '''README\.md$''',
    '''SECURITY\.md$''',
    '''DEPLOY\.md$''',
    '''\.git.*$''',
    '''node_modules/.*$''',
    '''\.next/.*$''',
    '''coverage/.*$'''
]

# 除外するコミット
commits = [
    # 除外したいコミットハッシュがあればここに追加
]

# カスタムルール
[[rules]]
id = "stripe-api-key"
description = "Stripe API Key"
regex = '''sk_(live|test)_[a-zA-Z0-9]{24,}'''
tags = ["api", "stripe", "key"]

[[rules]]
id = "stripe-publishable-key"
description = "Stripe Publishable Key"
regex = '''pk_(live|test)_[a-zA-Z0-9]{24,}'''
tags = ["api", "stripe", "publishable"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "access-key"]

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
tags = ["google", "api-key"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*'''
tags = ["jwt", "token"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''[a-zA-Z0-9]{32,}'''
tags = ["generic", "api-key"]
# より具体的なパターンがある場合は除外
[rules.allowlist]
description = "Exclude common false positives"
regexes = [
    '''npm install''',
    '''git commit''',
    '''console\.log''',
    '''localhost:3000''',
    '''example\.com''',
    '''your-domain\.com'''
]

[[rules]]
id = "env-file"
description = "Environment files"
regex = '''\.env[^.]*$'''
path = '''\.env[^.]*$'''
tags = ["env", "file"]
[rules.allowlist]
paths = [
    '''\.env\.example$'''
]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN [A-Z]+ PRIVATE KEY-----'''
tags = ["private-key", "certificate"]

[[rules]]
id = "password-assignment"
description = "Password Assignment"
regex = '''(?i)(password|passwd|pwd)\s*[=:]\s*[\"']?[a-zA-Z0-9@#$%^&*()_+\-=\[\]{};':\"\\|,.<>\/?]{8,}[\"']?'''
tags = ["password", "assignment"]

[[rules]]
id = "api-token"
description = "API Token"
regex = '''(?i)(api[_-]?token|access[_-]?token|auth[_-]?token)\s*[=:]\s*[\"']?[a-zA-Z0-9]{20,}[\"']?'''
tags = ["api", "token"]