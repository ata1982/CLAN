name: Deploy Next.js to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 🔒 セキュリティチェックジョブ
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Security Audit
        run: npm audit --audit-level=high

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: security-scan  # セキュリティスキャン完了後に実行
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: 🔍 Environment Variables Check
        run: |
          echo "Checking for exposed secrets in build..."
          # 環境変数が適切に設定されているかチェック
          if [ "$NODE_ENV" = "production" ]; then
            echo "Production environment detected"
          else
            echo "Development environment detected"
          fi

      - name: Type Check
        run: npm run type-check

      - name: Lint Check
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Run Build
        run: npm run build

      - name: 🔒 Build Output Security Check
        run: |
          echo "Checking build output for exposed secrets..."
          # ビルド出力に機密情報が含まれていないかチェック
          if grep -r "sk_live\|sk_test\|AKIA\|eyJ" .next/ 2>/dev/null; then
            echo "❌ Potential secrets found in build output!"
            exit 1
          else
            echo "✅ No secrets detected in build output"
          fi

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed! ✅ Security checks passed.'
            })
